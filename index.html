img{

 <label for="uname">~Username~</label>

        <p id="display"></p>

         <input type="reset" name="button" id="cancel" value="Cancel" class="btn btn-info rounded-5" >
    </form>




<script>
        let attempt_counter = 0;

        function authenticate(){
            let username = document.getElementById("uname").value;
            let pwd = document.getElementById("pwd").value;
            let granted = "Welcome!!" + username + "!";
            let denied = "too many tries....";

        while (attempt_counter < 3) {
        if (username === "QTPi_67" && pwd === "AllHAilMonikA41") {
            alert(granted);
            attempt_counter = 0; 
            document.getElementById("display").innerHTML = "";
            window.location.href = "index.html";

            break; 
        }

        else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Oh!~ That can't be right!~" + attempt_counter + " of 3 ";
            break; 
        }

        }
        if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginBTN").disabled = true; 
            }
        }
    </script>
